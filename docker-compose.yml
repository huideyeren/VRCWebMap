services:
  backend:
    build:
      context: .
    ports:
      - "5021:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Provider: PostgreSQL
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=vrcwebmap;Username=vrcwebmap;Password=vrcwebmap
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: vrcwebmap
      POSTGRES_USER: vrcwebmap
      POSTGRES_PASSWORD: vrcwebmap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrcwebmap -d vrcwebmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    profiles:
      - cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
