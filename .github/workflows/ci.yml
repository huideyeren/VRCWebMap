name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore VrcWebMap.Backend.sln

      - name: Build
        run: dotnet build VrcWebMap.Backend.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test VrcWebMap.Backend.Tests/VrcWebMap.Backend.Tests.csproj --configuration Debug --no-restore --verbosity normal
